name: Deploy to Namecheap

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}
        run: npm run build

      - name: Upload exported site to Namecheap
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.NAMECHEAP_FTP_SERVER }}
          username: ${{ secrets.NAMECHEAP_FTP_USERNAME }}
          password: ${{ secrets.NAMECHEAP_FTP_PASSWORD }}
          port: 21
          local-dir: ./out/
          server-dir: ${{ secrets.NAMECHEAP_SERVER_DIR }}
          dangerous-clean-slate: true
